<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board of Sponsors | General Trias College of Cavite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body data-depth="2" class="bg-[#F8F7F3] font-['Inter',_sans-serif] text-[#1F2933] antialiased">
  <div id="site-header"></div>

  <main class="mx-auto max-w-6xl px-4 py-12">
    <section class="rounded-3xl border border-[#A51C30]/15 bg-white px-8 py-12 shadow-sm mb-10">
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-[#A51C30]">About GTCC</p>
      <h1 class="mt-3 text-4xl font-semibold text-[#1A1F2B]">Board of Sponsors</h1>
      <p class="mt-4 max-w-2xl text-lg text-slate-600">
        우리 학교의 발전을 위해 헌신해주시는 후원자 여러분을 소개합니다.
      </p>
    </section>

    <div class="grid gap-10 lg:grid-cols-[280px,1fr]">
      <aside id="sidebar" class="hidden lg:block lg:sticky lg:top-32"></aside>

      <article class="prose max-w-none text-slate-700">
        <h2 class="text-3xl font-bold mb-10 text-center text-[#1A1F2B]">교수 소개</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 not-prose">
          
          <article class="flex flex-col md:flex-row items-center md:items-start gap-6 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm hover:shadow-lg transition-shadow duration-300">
            <img src="../../assets/images/남궁선 목사.png" alt="남궁선 총장" class="w-32 h-32 md:w-40 md:h-40 rounded-2xl object-cover flex-shrink-0">
            <div class="space-y-2 text-center md:text-left flex-grow">
              <h3 class="text-2xl font-bold text-[#1A1F2B]">남궁선</h3>
              <p class="text-[#A51C30] font-semibold text-base mb-3">총장</p>
              <ul class="text-sm text-slate-600 space-y-1 pl-0 list-none">
                <li>• 조직신학 / 개혁주의 신학</li>
                <li>• 총회신학학술연구원 학장</li>
                <li>• 교단 신학교육 및 목회자 양성 총괄</li>
                <li>• 저서 : 삶의 여정 속에서</li>
              </ul>
            </div>
          </article>

          <article class="flex flex-col md:flex-row items-center md:items-start gap-6 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm hover:shadow-lg transition-shadow duration-300">
            <img src="../../assets/images/C.png" alt="채 윤 학생처장" class="w-32 h-32 md:w-40 md:h-40 rounded-2xl object-cover flex-shrink-0">
            <div class="space-y-2 text-center md:text-left flex-grow">
              <h3 class="text-2xl font-bold text-[#1A1F2B]">채 윤</h3>
              <p class="text-[#A51C30] font-semibold text-base mb-3">학생처장</p>
              <ul class="text-sm text-slate-600 space-y-1 pl-0 list-none">
                <li>• 성경신학 / 조직신학 / 역사신학</li>
                <li>• 개혁주의 신학의 정통성과 학문 연구 지도</li>
                <li>• 원어, 주해, 교리 교육 중심 강의</li>
                <li>• 저서 :성경신학</li>
              </ul>
            </div>
          </article>

          </div>
      </article>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
