<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board of Sponsors | General Trias College of Cavite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body data-depth="2" class="bg-[#F8F7F3] font-['Inter',_sans-serif] text-[#1F2933] antialiased">
  <div id="site-header"></div>

  <main class="mx-auto max-w-6xl px-4 py-12">
    <section class="rounded-3xl border border-[#A51C30]/15 bg-white px-8 py-12 shadow-sm mb-10">
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-[#A51C30]">About GTCC</p>
      <h1 class="mt-3 text-4xl font-semibold text-[#1A1F2B]">Board of Sponsors</h1>
      <p class="mt-4 max-w-2xl text-lg text-slate-600">
        우리 학교의 발전을 위해 헌신해주시는 후원자 여러분을 소개합니다.
      </p>
    </section>

    <div class="grid gap-10 lg:grid-cols-[280px,1fr]">
      <aside id="sidebar" class="hidden lg:block lg:sticky lg:top-32"></aside>

      <section class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <article class="flex flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition-hover hover:shadow-md">
            <div class="aspect-[4/5] w-full overflow-hidden bg-slate-100">
              <img src="../../assets/images/남궁선 목사.png" alt="남궁선" class="h-full w-full object-cover">
            </div>
            <div class="p-6">
              <h3 class="text-xl font-bold text-[#1A1F2B]">남궁선</h3>
              <p class="text-[#A51C30] font-medium text-sm mb-4">총장</p>
              <ul class="space-y-2 text-sm text-slate-600 border-t border-slate-100 pt-4">
                <li>• 조직신학 / 개혁주의 신학</li>
                <li>• 총회신학학술연구원 학장</li>
                <li>• 저서 : 삶의 여정 속에서</li>
              </ul>
            </div>
          </article>

          <article class="flex flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition-hover hover:shadow-md">
            <div class="aspect-[4/5] w-full overflow-hidden bg-slate-100">
              <img src="../../assets/images/김낙신총장님프로필사진.jpg" alt="김낙신" class="h-full w-full object-cover">
            </div>
            <div class="p-6">
              <h3 class="text-xl font-bold text-[#1A1F2B]">김낙신</h3>
              <p class="text-[#A51C30] font-medium text-sm mb-4">교수</p>
              <ul class="space-y-2 text-sm text-slate-600 border-t border-slate-100 pt-4">
                <li>• 설교학 / 목회학 / 예배학</li>
                <li>• 교회 현장 중심의 실천신학 교육</li>
                <li>• 저서: 교단과 지역교회를 섬길 목회자 양성</li>
              </ul>
            </div>
          </article>

          </div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
