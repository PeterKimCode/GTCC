<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board of Sponsors | General Trias College of Cavite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-depth="2" class="bg-[#F8F7F3] font-['Inter',_sans-serif] text-[#1F2933]">
  <div id="site-header"></div>
  <main class="mx-auto max-w-6xl px-4 py-12">
    <section class="rounded-3xl border border-[#A51C30]/15 bg-white px-8 py-12 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-[#A51C30]">About GTCC</p>
      <h1 class="mt-3 text-4xl font-semibold text-[#1A1F2B]">Board of Sponsors</h1>
      <p class="mt-4 max-w-2xl text-lg text-slate-600">
        우리 학교의 발전을 위해 헌신해주시는 후원자 여러분을 소개합니다.
      </p>
    </section>

    <div class="mt-10 grid gap-10 lg:grid-cols-[280px,1fr]">
      <aside id="sidebar"></aside>
      <article class="rounded-3xl border border-slate-200/60 bg-white p-8 shadow-sm">
        <div class="prose max-w-none text-slate-700">
          <h2 class="text-2xl font-bold mb-6">후원회 명단</h2>
          <p>여기에 후원자 명단이나 내용을 입력하시면 됩니다.</p>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
